<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>

<style>

/* GLOBAL */
body{
margin:0;
font-family:system-ui;
background:#343541;
color:#ececf1;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#202123;
padding:10px;
display:flex;
flex-direction:column;
}

.logo{
font-size:14px;
margin-bottom:10px;
}

.new-chat{
border:1px solid #3e3f4b;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

.history div{
padding:8px;
cursor:pointer;
font-size:13px;
opacity:0.8;
}

/* CHAT */
.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding:30px 0;
}

/* WRAPPER */
.message-wrapper{
width:100%;
max-width:740px;
display:flex;
gap:10px;
}

/* AVATAR */
.avatar{
width:30px;
height:30px;
border-radius:5px;
background:#19c37d;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

/* MESSAGE */
.message{
padding:18px;
font-size:15px;
line-height:1.6;
flex:1;
}

.user{
background:#444654;
border-radius:8px;
}

.bot{
background:#343541;
border-top:1px solid #565869;
}

/* INPUT */
.input-box{
background:#40414f;
padding:20px;
display:flex;
justify-content:center;
}

.input-inner{
width:100%;
max-width:740px;
display:flex;
}

input{
flex:1;
padding:16px;
background:#40414f;
border:1px solid #565869;
border-radius:6px;
color:white;
}

button{
margin-left:10px;
padding:16px;
background:#19c37d;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* COPY BUTTON */
.copy{
font-size:12px;
opacity:0.6;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🤖 StudyAI</div>
<div class="new-chat" onclick="newChat()">+ Nouvelle</div>
<div class="history" id="history"></div>
</div>

<div class="chat-container">

<div class="chat" id="chat"></div>

<div class="input-box">
<div class="input-inner">
<input id="input" placeholder="Envoyer un message..." onkeydown="if(event.key==='Enter') send()">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("chats")) || [];

function save(){
localStorage.setItem("chats", JSON.stringify(chats));
updateHistory();
}

function updateHistory(){
let h = document.getElementById("history");
h.innerHTML="";
chats.slice(-10).forEach((c,i)=>{
h.innerHTML += `<div onclick="loadChat(${i})">💬 ${c.user}</div>`;
});
}

function loadChat(i){
document.getElementById("chat").innerHTML="";
let c = chats[i];

addMessage(c.user,"user");
addMessage(c.bot,"bot");
}

function newChat(){
document.getElementById("chat").innerHTML="";
}

function addMessage(text,type){

let id = "m"+Date.now();

document.getElementById("chat").innerHTML += `
<div class="message-wrapper">
<div class="avatar">${type=="user"?"🧑":"🤖"}</div>
<div>
<div class="message ${type}" id="${id}">${text}</div>
${type=="bot"?'<div class="copy" onclick="copyText(`'+text+'`)">Copier</div>':""}
</div>
</div>
`;

document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight;
}

function copyText(t){
navigator.clipboard.writeText(t);
alert("Copié !");
}

async function send(){

let input = document.getElementById("input");
let text = input.value;

if(!text) return;

addMessage(text,"user");

// IA gratuite
let reply="";

try{
let res=await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({inputs:text})
});
let data=await res.json();
reply=data[0]?.generated_text || "Réponse indisponible";
}catch{
reply="⚠️ IA occupée";
}

addMessage(reply,"bot");

// save
chats.push({user:text, bot:reply});
save();

input.value="";
}

updateHistory();

</script>

</body>
</html>
