<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MK AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#020617;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.chat-container{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px;
padding:12px;
border-radius:10px;
max-width:70%;
}

.user{
background:#22c55e;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input-box{
display:flex;
padding:10px;
background:#020617;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
margin-left:10px;
cursor:pointer;
}

.ad{
background:#111;
padding:10px;
margin-top:20px;
font-size:12px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>MK AI 🚀</h2>
<p>IA gratuite</p>

<div class="ad">
💰 Pub ici (AdSense)
</div>
</div>

<div class="chat-container">

<div class="chat" id="chat"></div>

<div class="input-box">
<input id="input" placeholder="Pose ta question...">
<button onclick="send()">Envoyer</button>
</div>

</div>

<script>

function fakeAI(text){

text = text.toLowerCase();

if(text.includes("argent")){
return "💰 Astuce : crée un site viral et ajoute des pubs.";
}

if(text.includes("site")){
return "🌍 Utilise GitHub Pages pour créer un site gratuit.";
}

if(text.includes("bonjour")){
return "👋 Salut ! Je suis MK AI.";
}

return "🤖 Réponse intelligente : " + text;
}

function send(){

let input = document.getElementById("input");
let text = input.value;

if(!text) return;

// user
document.getElementById("chat").innerHTML += 
`<div class="message user">${text}</div>`;

// bot
setTimeout(()=>{
let reply = fakeAI(text);

document.getElementById("chat").innerHTML += 
`<div class="message bot">${reply}</div>`;

document.getElementById("chat").scrollTop = 
document.getElementById("chat").scrollHeight;

},500);

input.value = "";

}

</script>

</body>
</html>
