<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudyAI - IA gratuite</title>

<style>

/* GLOBAL */
body{
margin:0;
font-family:system-ui, -apple-system;
background:#0f172a;
color:#e5e7eb;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#020617;
padding:15px;
display:flex;
flex-direction:column;
border-right:1px solid #1e293b;
}

.logo{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.new-chat{
background:#1e293b;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
transition:0.2s;
}

.new-chat:hover{
background:#334155;
}

.history{
flex:1;
overflow-y:auto;
font-size:13px;
opacity:0.8;
}

/* CHAT */
.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow-y:auto;
padding:40px;
}

/* MESSAGES */
.message{
max-width:700px;
padding:16px;
margin:12px 0;
border-radius:14px;
line-height:1.6;
animation:fadeIn 0.3s ease;
}

.user{
background:#2563eb;
margin-left:auto;
color:white;
}

.bot{
background:#1e293b;
}

/* INPUT */
.input-box{
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
display:flex;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
font-size:15px;
outline:none;
}

button{
margin-left:10px;
padding:14px 18px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:700px){
.sidebar{
display:none;
}
.chat{
padding:20px;
}
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🚀 StudyAI</div>
<div class="new-chat" onclick="newChat()">+ Nouvelle</div>
<div class="history" id="history"></div>
</div>

<div class="chat-container">

<div class="chat" id="chat"></div>

<div class="input-box">
<input id="input" placeholder="Pose ta question..." onkeydown="if(event.key==='Enter') send()">
<button onclick="send()">➤</button>
</div>

</div>

<script>

let conversations = [];

function newChat(){
document.getElementById("chat").innerHTML = "";
}

/* effet typing */
function typeText(element, text){
let i = 0;
let interval = setInterval(()=>{
element.innerHTML += text.charAt(i);
i++;
if(i >= text.length) clearInterval(interval);
},15);
}

async function send(){

let input = document.getElementById("input");
let text = input.value;

if(!text) return;

// message user
document.getElementById("chat").innerHTML += 
`<div class="message user">${text}</div>`;

// message vide pour typing
let id = "m"+Date.now();
document.getElementById("chat").innerHTML += 
`<div class="message bot" id="${id}"></div>`;

// scroll
document.getElementById("chat").scrollTop = 
document.getElementById("chat").scrollHeight;

// historique
conversations.push(text);
updateHistory();

// appel IA gratuite
let reply = "";

try{
let res = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({inputs:text})
});

let data = await res.json();
reply = data[0]?.generated_text || "Réponse indisponible";
}catch{
reply = "⚠️ IA occupée, réessaie.";
}

// effet écriture
typeText(document.getElementById(id), reply);

input.value = "";

}

function updateHistory(){
let h = document.getElementById("history");
h.innerHTML = "";

conversations.slice(-10).forEach(c=>{
h.innerHTML += `<div>💬 ${c}</div>`;
});
}

</script>

</body>
</html>
